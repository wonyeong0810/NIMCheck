name: Check and deploy NIM status

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate status JSON
        run: node scripts/check-endpoints.js
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CHECK_INTERVAL_MS: 600000
          REQUEST_TIMEOUT_MS: 20000
          SLOW_THRESHOLD_MS: 8000
          MODEL_CONCURRENCY: 3
          PROBE_MAX_TOKENS: 32

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
